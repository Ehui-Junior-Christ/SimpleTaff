<!DOCTYPE html>
<html lang="fr" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SimpleTaff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/global.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="absolute top-0 inset-x-0 h-64 bg-gradient-to-b from-brand-100/50 to-transparent pointer-events-none"></div>

    <div class="glass-panel w-full max-w-md p-8 rounded-2xl relative z-10 fade-in-up">
        <div class="text-center mb-8">
            <div class="mx-auto w-12 h-12 rounded-xl bg-gradient-to-br from-brand-500 to-brand-600 shadow-lg shadow-brand-500/30 flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-semibold text-gray-900 tracking-tight">Bon retour</h2>
            <p class="text-sm text-gray-500 mt-1">Connectez-vous à votre espace professionnel</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div id="errorMsg" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-100"></div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Adresse email</label>
                <input type="email" id="email" required class="input-minimal" placeholder="vous@entreprise.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" id="password" required class="input-minimal" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full py-3 px-4 flex justify-center items-center text-sm font-medium rounded-xl text-white bg-gray-900 hover:bg-gray-800 shadow-md transition-all spring-transform hover:-translate-y-0.5 mt-2">
                <span id="btnText">Se connecter</span>
                <svg id="btnSpinner" class="hidden animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <a href="/" class="text-gray-500 hover:text-gray-900 transition-colors">← Retour à l'accueil</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            btnText.textContent = 'Connexion en cours...';
            btnSpinner.classList.remove('hidden');

            localStorage.removeItem('token');
            localStorage.removeItem('userRole');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) {
                    throw new Error('Identifiants incorrects.');
                }

                const response = await res.json();
                localStorage.setItem('token', response.token);
                localStorage.setItem('userRole', response.role);
                
                // Redirection basée sur le rôle
                switch(response.role) {
                    case 'ROLE_SUPER_ADMIN': window.location.href = '/super-admin/'; break;
                    case 'ROLE_ADMIN_ENTREPRISE': window.location.href = '/admin-entreprise/'; break;
                    case 'ROLE_COORDONNATEUR': window.location.href = '/coordonnateur/'; break;
                    case 'ROLE_EMPLOYEUR': window.location.href = '/employeur/'; break;
                    default: window.location.href = '/';
                }
            } catch (err) {
                errorMsg.textContent = 'Identifiants incorrects ou erreur réseau.';
                errorMsg.classList.remove('hidden');
            } finally {
                btnText.textContent = 'Se connecter';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
